version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=sqlite:///./astroagent.db
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
      - MAX_AGENT_STEPS=8
      - FAISS_INDEX_PATH=rag/faiss_index
      - ROUTER_MODEL=gpt-4o-mini
      - REASONER_MODEL=gpt-4o
    volumes:
      - ./backend:/app
      - backend_db:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    command: npm run dev -- --host
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend_db:
